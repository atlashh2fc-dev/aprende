name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores del mismo ref si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, lint y build
    runs-on: ubuntu-latest
    # Variables de entorno mínimas para que el build no falle por config faltante.
    # Son valores dummy solo para compilar; no se usan para conectarse a nada.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://demo.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint informativo: el proyecto arrastra reglas estrictas del React
      # Compiler; no bloquea el CI, pero deja el reporte visible.
      - name: Lint (informativo)
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build
